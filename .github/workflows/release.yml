name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          notes=$(awk '/^## \[${{ steps.version.outputs.version }}\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            echo "Release $GITHUB_REF_NAME already exists, updating..."
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "${{ steps.changelog.outputs.notes }}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "${{ steps.changelog.outputs.notes }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates to crates.io
        run: |
          crates=(mixtape-anthropic-sdk mixtape-core mixtape-tools mixtape-cli mixtape-server)
          for crate in "${crates[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" || echo "$crate already published, skipping"
            echo "Waiting for crates.io index to update..."
            sleep 30
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
